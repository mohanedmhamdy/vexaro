<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexaro Padel Academy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #C0392B; --red-glow: #E74C3C; --red-dark: #7B241C;
    --bg: #0A0A0A; --surface: #111111; --border: rgba(192,57,43,0.25);
    --text: #E8E8E8; --muted: #666;
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: linear-gradient(rgba(192,57,43,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(192,57,43,0.04) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }
  .page {
    position: relative; z-index: 1; max-width: 480px; margin: 0 auto;
    padding: 48px 24px 64px; display: flex; flex-direction: column; align-items: center;
  }
  .logo-wrap {
    width: 160px; height: 160px; border-radius: 50%; overflow: hidden;
    border: 2px solid var(--red); margin-bottom: 24px; flex-shrink: 0;
    box-shadow: 0 0 0 1px var(--red-dark), 0 0 32px rgba(192,57,43,0.4), 0 0 80px rgba(192,57,43,0.15);
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .academy-name { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; text-shadow: 0 0 20px rgba(192,57,43,0.6); margin-bottom: 4px; text-align: center; }
  .academy-sub { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.35em; text-transform: uppercase; color: var(--red-glow); margin-bottom: 6px; text-align: center; }
  .academy-tagline { font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 40px; text-align: center; }
  .divider { width: 100%; display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--red), transparent); }
  .divider span { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .links { width: 100%; display: flex; flex-direction: column; gap: 14px; margin-bottom: 48px; }
  .link-btn {
    display: flex; align-items: center; gap: 16px; padding: 18px 22px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    text-decoration: none; color: var(--text); transition: all 0.2s ease;
    position: relative; overflow: hidden;
  }
  .link-btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--red); opacity: 0; transition: opacity 0.2s; }
  .link-btn:hover { border-color: var(--red); background: #161616; transform: translateX(4px); box-shadow: 0 0 20px rgba(192,57,43,0.2); }
  .link-btn:hover::before { opacity: 1; }
  .link-icon { width: 42px; height: 42px; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .link-icon svg { width: 22px; height: 22px; }
  .link-text { display: flex; flex-direction: column; gap: 2px; }
  .link-platform { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; }
  .link-handle { font-size: 0.75rem; color: var(--muted); }
  .link-arrow { margin-left: auto; color: var(--red); opacity: 0.5; transition: opacity 0.2s, transform 0.2s; flex-shrink: 0; }
  .link-btn:hover .link-arrow { opacity: 1; transform: translateX(3px); }
  .qr-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .qr-label { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); }
  .qr-frame { padding: 16px; background: #fff; border-radius: 4px; position: relative; box-shadow: 0 0 0 1px var(--red-dark), 0 0 24px rgba(192,57,43,0.3); }
  .qr-frame::before, .qr-frame::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--red); border-style: solid; }
  .qr-frame::before { top: -4px; left: -4px; border-width: 3px 0 0 3px; border-radius: 2px 0 0 0; }
  .qr-frame::after  { bottom: -4px; right: -4px; border-width: 0 3px 3px 0; border-radius: 0 0 2px 0; }
  #qrcode canvas, #qrcode img { display: block; }
  .qr-hint { font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); text-align: center; }
  .footer { margin-top: 48px; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #333; text-align: center; }

  /* ── Admin toggle ── */
  .admin-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--red); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(192,57,43,0.5); transition: transform 0.2s, box-shadow 0.2s;
  }
  .admin-toggle:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(192,57,43,0.7); }
  .admin-toggle svg { width: 22px; height: 22px; fill: white; }

  /* ── Overlay shared ── */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.88); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .overlay.open { display: flex; }

  /* ── Password screen ── */
  .pass-panel {
    background: #141414; border: 1px solid var(--border); border-radius: 8px;
    width: 100%; max-width: 340px; padding: 36px 28px; text-align: center;
  }
  .pass-icon { font-size: 2rem; margin-bottom: 16px; }
  .pass-title { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; margin-bottom: 6px; }
  .pass-sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 24px; }
  .pass-input {
    width: 100%; background: #0e0e0e; border: 1px solid #2a2a2a; border-radius: 4px;
    color: var(--text); padding: 12px 14px; font-size: 1rem; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.2s; text-align: center; letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .pass-input:focus { border-color: var(--red); }
  .pass-input.error { border-color: #c0392b; animation: shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pass-btn {
    width: 100%; padding: 13px; background: var(--red); border: none; border-radius: 4px;
    color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s;
    margin-bottom: 10px;
  }
  .pass-btn:hover { background: var(--red-glow); }
  .pass-cancel { background: none; border: none; color: var(--muted); font-size: 0.8rem; cursor: pointer; }
  .pass-cancel:hover { color: #fff; }
  .pass-err { font-size: 0.75rem; color: var(--red-glow); margin-top: 6px; min-height: 18px; }

  /* ── Admin panel ── */
  .admin-panel {
    background: #141414; border: 1px solid var(--border); border-radius: 8px;
    width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; padding: 28px 24px;
  }
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .admin-title { font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; }
  .admin-header-right { display: flex; align-items: center; gap: 10px; }
  .admin-logout { background: none; border: 1px solid #2a2a2a; border-radius: 3px; color: var(--muted); font-size: 0.7rem; cursor: pointer; padding: 5px 10px; letter-spacing: 0.08em; transition: all 0.2s; }
  .admin-logout:hover { border-color: var(--red); color: var(--red-glow); }
  .admin-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.4rem; line-height: 1; padding: 4px; transition: color 0.2s; }
  .admin-close:hover { color: #fff; }
  .admin-links-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .admin-link-item { display: flex; align-items: center; gap: 10px; background: #1a1a1a; border: 1px solid #222; border-radius: 4px; padding: 12px 14px; }
  .admin-link-icon { width: 32px; height: 32px; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .admin-link-icon svg { width: 16px; height: 16px; }
  .admin-link-info { flex: 1; min-width: 0; }
  .admin-link-name { font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 700; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; }
  .admin-link-url { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .admin-del-btn { background: none; border: 1px solid #2a2a2a; border-radius: 3px; color: var(--muted); cursor: pointer; padding: 5px 8px; font-size: 0.75rem; transition: all 0.2s; flex-shrink: 0; }
  .admin-del-btn:hover { border-color: var(--red); color: var(--red-glow); }
  .admin-section-title { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .admin-add { display: flex; flex-direction: column; gap: 10px; }
  .admin-select, .admin-input {
    width: 100%; background: #0e0e0e; border: 1px solid #2a2a2a; border-radius: 4px;
    color: var(--text); padding: 11px 14px; font-size: 0.85rem; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .admin-select:focus, .admin-input:focus { border-color: var(--red); }
  .admin-select option { background: #111; }
  .admin-add-btn {
    width: 100%; padding: 13px; background: var(--red); border: none; border-radius: 4px;
    color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
  }
  .admin-add-btn:hover { background: var(--red-glow); box-shadow: 0 0 16px rgba(192,57,43,0.4); }
  .admin-sep { height: 1px; background: #1e1e1e; margin: 4px 0; }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a1a1a; border: 1px solid var(--red); border-radius: 4px;
    padding: 10px 20px; font-size: 0.8rem; color: var(--text);
    opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

// ── State ──
let links = [];
let nextId = 1;
let isAuthenticated = sessionStorage.getItem(SESSION_KEY) === '1';

async function loadLinks() {
  try {
    const res = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY, 'X-Access-Key': API_KEY }
    });
    const data = await res.json(); console.log('Loaded:', data);
    links = data.record.links || [];
    nextId = data.record.nextId || (Math.max(...links.map(l => l.id), 0) + 1);
  } catch(e) {
    links = [
      { platform: 'facebook',  url: 'https://www.facebook.com/share/1TtmzSfetv/?mibextid=wwXIfr', customLabel: '', id: 1 },
      { platform: 'instagram', url: 'https://www.instagram.com/vexaro_padel_academy/',              customLabel: '', id: 2 },
      { platform: 'tiktok',    url: 'https://www.tiktok.com/@vexaro.padel.acad',                   customLabel: '', id: 3 },
    ];
    nextId = 4;
  }
  renderLinks();
}

async function saveLinks(linksToSave) {
  try {
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY,
        'X-Access-Key': API_KEY
      },
      body: JSON.stringify({ links: linksToSave, nextId })
    }); console.log('Saved OK'); return;
    });
  } catch(e) {
    showToast('⚠️ Save failed – check connection');
  }
}

// ── Auth ──
function openPasswordScreen() {
  if (isAuthenticated) { openAdminPanel(); return; }
  document.getElementById('passInput').value = '';
  document.getElementById('passErr').textContent = '';
  document.getElementById('passOverlay').classList.add('open');
  setTimeout(() => document.getElementById('passInput').focus(), 100);
}
function checkPassword() {
  const val = document.getElementById('passInput').value;
  if (val === CORRECT_PASS) {
    isAuthenticated = true;
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('passOverlay').classList.remove('open');
    openAdminPanel();
  } else {
    const inp = document.getElementById('passInput');
    inp.classList.add('error');
    document.getElementById('passErr').textContent = 'Incorrect password';
    setTimeout(() => inp.classList.remove('error'), 400);
    inp.value = '';
  }
}
function logout() {
  isAuthenticated = false;
  sessionStorage.removeItem(SESSION_KEY);
  closeAll();
  showToast('Locked 🔒');
}
function closeAll() {
  document.getElementById('passOverlay').classList.remove('open');
  document.getElementById('adminOverlay').classList.remove('open');
}

// ── Admin panel ──
function openAdminPanel() {
  renderAdminList();
  document.getElementById('adminOverlay').classList.add('open');
}
function onPlatformChange() {
  const val = document.getElementById('platformSelect').value;
  document.getElementById('customLabel').style.display = val === 'other' ? 'block' : 'none';
}
async function addLink() {
  const platform = document.getElementById('platformSelect').value;
  const url = document.getElementById('linkUrl').value.trim();
  const customLabel = document.getElementById('customLabel').value.trim();
  if (!platform) { showToast('Choose a platform first'); return; }
  if (!url) { showToast('Paste a link first'); return; }
  links.push({ platform, url, customLabel, id: nextId++ });
  await saveLinks(links);
  renderLinks();
  renderAdminList();
  document.getElementById('platformSelect').value = '';
  document.getElementById('linkUrl').value = '';
  document.getElementById('customLabel').value = '';
  document.getElementById('customLabel').style.display = 'none';
  showToast('Link added ✓');
}
async function deleteLink(id) {
  links = links.filter(l => l.id !== id);
  await saveLinks(links);
  renderLinks();
  renderAdminList();
  showToast('Link removed');
}

// ── Render ──
function iconStyle(p) {
  const def = PLATFORMS[p] || PLATFORMS.other;
  const border = def.border ? `border:${def.border};` : '';
  return def.color.startsWith('linear') ? `background:${def.color};${border}` : `background:${def.color};${border}`;
}
function arrowSvg() {
  return `<svg class="link-arrow" viewBox="0 0 20 20" fill="currentColor" width="16"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>`;
}
function getHandle(url, platform) {
  try {
    const u = new URL(url.startsWith('http') ? url : 'https://'+url);
    if (platform === 'whatsapp') return u.searchParams.get('phone') || u.pathname.replace('/','');
    return u.pathname.replace(/\//g,'') || u.hostname;
  } catch { return url; }
}
function renderLinks() {
  const container = document.getElementById('linksContainer');
  container.innerHTML = '';
  links.forEach(link => {
    const def = PLATFORMS[link.platform] || PLATFORMS.other;
    const href = link.url.startsWith('http') ? link.url : 'https://'+link.url;
    const handle = link.customLabel || getHandle(link.url, link.platform);
    const a = document.createElement('a');
    a.className = 'link-btn';
    a.href = href; a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = `
      <div class="link-icon" style="${iconStyle(link.platform)}">
        <svg viewBox="0 0 24 24" fill="white">${def.icon}</svg>
      </div>
      <div class="link-text">
        <span class="link-platform">${def.label}</span>
        <span class="link-handle">${handle}</span>
      </div>
      ${arrowSvg()}`;
    container.appendChild(a);
  });
}
function renderAdminList() {
  const list = document.getElementById('adminLinksList');
  list.innerHTML = '';
  if (links.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:12px">No links yet</div>';
    return;
  }
  links.forEach(link => {
    const def = PLATFORMS[link.platform] || PLATFORMS.other;
    const item = document.createElement('div');
    item.className = 'admin-link-item';
    item.innerHTML = `
      <div class="admin-link-icon" style="${iconStyle(link.platform)}">
        <svg viewBox="0 0 24 24" fill="white">${def.icon}</svg>
      </div>
      <div class="admin-link-info">
        <div class="admin-link-name">${def.label}</div>
        <div class="admin-link-url">${link.url}</div>
      </div>
      <button class="admin-del-btn" onclick="deleteLink(${link.id})">Remove</button>`;
    list.appendChild(item);
  });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Close on outside click
['passOverlay','adminOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) closeAll();
  });
});

// ── Init ──
loadLinks();
new QRCode(document.getElementById("qrcode"), {
  text: window.location.href,
  width: 180, height: 180,
  colorDark: "#000000", colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
